server {
    listen 80;
    server_name _;

    charset utf-8;
    sendfile on;
    tcp_nopush on;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Превью — отключаем кеш, чтобы заказчики всегда видели актуальную версию
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Landing (главная — выбор вариантов)
    location = / {
        root /srv/landing;
        try_files /index.html =404;
    }

    location = /icon.svg {
        root /srv/landing;
        try_files /icon.svg =404;
    }

    # Variant A
    location /variant-a {
        return 301 /variant-a/;
    }
    location /variant-a/ {
        alias /srv/variant-a/;
        index index.html;
        try_files $uri $uri/ /variant-a/index.html;
    }

    # Variant B
    location /variant-b {
        return 301 /variant-b/;
    }
    location /variant-b/ {
        alias /srv/variant-b/;
        index index.html;
        try_files $uri $uri/ /variant-b/index.html;
    }

    # Variant C
    location /variant-c {
        return 301 /variant-c/;
    }
    location /variant-c/ {
        alias /srv/variant-c/;
        index index.html;
        try_files $uri $uri/ /variant-c/index.html;
    }

    # Health check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Fallback
    location / {
        return 302 /;
    }
}
